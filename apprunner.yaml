version: 1.0
runtime: nodejs22

build:
  commands:
    build:
      - corepack enable && pnpm install --frozen-lockfile && pnpm prisma generate

run:
  command: sh -c "./node_modules/.bin/nest build && node dist/main.js"
  network:
    port: 8000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
